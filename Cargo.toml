[package]
name = "dropspot"
version = "0.1.0"
edition = "2024"

[dependencies]
async-std = { version = "1.13.2", features = ["attributes"] }
chrono = "0.4.42"
sqlx = { version = "0.8.6", features = ["derive", "postgres", "runtime-async-std", "uuid"] }
thiserror = "2.0.17"
uuid = { version = "1.18.1", features = ["v4", "v8"] }
