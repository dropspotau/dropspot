<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropSpot</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="/static/dropspot/dist/style.css">
    <script type="module" src="/static/dropspot/dist/index.js"></script>
</head>
<body>
    <header hx-get="/app/header" hx-trigger="load" hx-target="this" hx-swap="outerHTML">Loading...</header>
    <main>
        <input type="file" id="file-input" class="file-upload">
        <section class="upload-area">
            <div></div>
            <div id="upload" class="upload-circle">
                <h1 class="text-white">dropspot</h1>
            </div>
            <md-icon-button class="md-icon-button-white">
                <md-icon>settings</md-icon>
            </md-icon-button>
        </section>
        <section id="linked-file"></section>
        <section id="recent-uploads"></section>
    </main>
</body>
</html>
